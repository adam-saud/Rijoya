{% extends "base.html" %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}
    <h1>Admin Dashboard</h1>
    <p>Welcome to the admin dashboard. Here you can manage products, view orders, and perform administrative tasks.</p>
    <div class="admin-login">
        <form action="/admin/login" method="post">
             <label for="admin_user">Admin User:</label>
             <input placeholder="username" type="text" id="admin_user" name="admin_user">
             <label for="admin_password">Admin Password:</label>
             <input placeholder="password" type="password" id="admin_password" name="admin_password">
             <button type="submit">submit</button>
        </form>
    </div>
    <div class="admin-signup">
        <form action="/admin/signup" method="post">
            <label for="new_admin_user">New Admin User:</label>
            <input placeholder="username" type="text" id="new_admin_user" name="new_admin_user">
            <label for="new_admin_password">New Admin Password:</label>
            <input placeholder="password" type="password" id="new_admin_password" name="new_admin_password">
            <button type="submit">Sign Up</button>
        </form>
    </div>
    {% endblock %}
